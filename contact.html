<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elegant Couture</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Load script.js once, with defer -->
  <script src="js/script.js" defer></script>
</head>
<body>
  <!-- Header -->
  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="products.html">Products</a>
      <a href="contact.html">Inquiries & Appointments</a>
      <a href="events.html">Events</a>
    </nav>
  </header>

  <!-- Marquee -->
  <marquee>Upcoming Event: Elegant Couture Fashion Show – April 2026</marquee>

  <!-- Contact Section -->
  <main>
    <h1>Inquiries & Appointments</h1>
    <form>
      <label>Name:</label>
      <input type="text" name="name" required><br>
      <label>Email:</label>
      <input type="email" name="email" required><br>
      <label>Message:</label>
      <textarea name="message" required></textarea><br>
      <label>Date:</label>
      <input type="date" name="date"><br>
      <button type="submit">Submit</button>
    </form>
  </main>

  <!-- Footer -->
  <footer>
    <p>© 2026 Elegant Couture. All rights reserved.</p>
  </footer>
</body>
